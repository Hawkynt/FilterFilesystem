name: Release

# Stable release — MANUAL dispatch only. The explicit "package + publish" action:
# runs CI, builds the multi-platform binaries and the Docker image, then cuts a
# dated GitHub Release.
#
# Versions are never taken from a git tag a human pushed. There is no single
# repo version (Go binaries stamp themselves via git describe), so the
# repo-level marker is the date: the Release/tag is `vyyyyMMdd`. Nightlies
# happen automatically (nightly.yml).
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you cutting this release? (optional, for the audit log)'
        required: false

permissions:
  contents: write

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each remaining action to a Node-24-native major.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    uses: ./.github/workflows/_build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute release marker
        run: echo "REL=v$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v8
        with:
          name: app-artifacts
          path: dist

      - name: Push Docker image to GHCR (:latest + dated tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker load < dist/filterfs-docker.tar.gz
          docker tag filterfs:latest "ghcr.io/hawkynt/filterfilesystem:$REL"
          docker tag filterfs:latest ghcr.io/hawkynt/filterfilesystem:latest
          docker push "ghcr.io/hawkynt/filterfilesystem:$REL"
          docker push ghcr.io/hawkynt/filterfilesystem:latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Update changelog + generate release notes (bucketed by + - * # !)
        run: node .github/workflows/scripts/update-changelog.mjs --release "$REL" --notes RELEASE_NOTES.md
      - name: Commit changelog (if it changed)
        run: |
          if ! git diff --quiet -- CHANGELOG.md; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "* update changelog for $REL [skip ci]"
            git push
          fi

      - name: Create GitHub Release (dated marker; tags vyyyyMMdd)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.REL }}
          name: ${{ env.REL }}
          files: dist/*
          body_path: RELEASE_NOTES.md            # commit-message changelog, not GitHub's PR notes
