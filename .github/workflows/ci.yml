name: Tests (CI)

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Quote explicit versions if used here: unquoted 1.20 is a YAML float
        # and collapses to "1.2" (Go 1.2.2 from 2013).
        go-version: [ 'oldstable', 'stable' ]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install FUSE
      run: |
        sudo apt-get update
        sudo apt-get install -y fuse libfuse-dev

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: make deps

    - name: Run linter
      uses: golangci/golangci-lint-action@v8
      with:
        version: latest

    - name: Run tests
      run: make test-coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella

    - name: Build binary
      run: make build

    - name: Run integration tests
      run: |
        # Create test directories
        mkdir -p /tmp/filterfs-test/source /tmp/filterfs-test/mount
        echo "test content" > /tmp/filterfs-test/source/test.txt
        echo "log content" > /tmp/filterfs-test/source/app.log

        # Test mounting (requires sudo for FUSE)
        sudo modprobe fuse
        timeout 10s ./bin/filterfs mount -s /tmp/filterfs-test/source -m /tmp/filterfs-test/mount -b "**/*.log" &
        sleep 2

        # Test that filtered file is hidden
        if [ -f /tmp/filterfs-test/mount/app.log ]; then
          echo "ERROR: Filtered file should be hidden"
          exit 1
        fi

        # Test that normal file is visible
        if [ ! -f /tmp/filterfs-test/mount/test.txt ]; then
          echo "ERROR: Normal file should be visible"
          exit 1
        fi

        # Cleanup
        sudo umount /tmp/filterfs-test/mount || true
        killall filterfs || true

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'

    - name: Build for multiple platforms
      run: make build-all

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: filterfs-binaries
        path: bin/

    - name: Build Docker image
      run: |
        docker build -t filterfs:latest .
        docker save filterfs:latest | gzip > filterfs-docker.tar.gz

    - name: Upload Docker image
      uses: actions/upload-artifact@v7
      with:
        name: filterfs-docker
        path: filterfs-docker.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'

    - name: Build release binaries
      run: make build-all

    - name: Create release with binaries
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "$GITHUB_REF_NAME" bin/* \
          --title "Release $GITHUB_REF_NAME" \
          --verify-tag
