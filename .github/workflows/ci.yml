name: Tests (CI)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.20, 1.21]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}
    
    - name: Install FUSE
      run: |
        sudo apt-get update
        sudo apt-get install -y fuse libfuse-dev
    
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: make deps
    
    - name: Run linter
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest
        args: --timeout=5m
    
    - name: Run tests
      run: make test-coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
    
    - name: Build binary
      run: make build
    
    - name: Run integration tests
      run: |
        # Create test directories
        mkdir -p /tmp/filterfs-test/source /tmp/filterfs-test/mount
        echo "test content" > /tmp/filterfs-test/source/test.txt
        echo "log content" > /tmp/filterfs-test/source/app.log
        
        # Test mounting (requires sudo for FUSE)
        sudo modprobe fuse
        timeout 10s ./bin/filterfs mount -s /tmp/filterfs-test/source -m /tmp/filterfs-test/mount -b "**/*.log" &
        sleep 2
        
        # Test that filtered file is hidden
        if [ -f /tmp/filterfs-test/mount/app.log ]; then
          echo "ERROR: Filtered file should be hidden"
          exit 1
        fi
        
        # Test that normal file is visible
        if [ ! -f /tmp/filterfs-test/mount/test.txt ]; then
          echo "ERROR: Normal file should be visible"
          exit 1
        fi
        
        # Cleanup
        sudo umount /tmp/filterfs-test/mount || true
        killall filterfs || true

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.21
    
    - name: Install FUSE
      run: |
        sudo apt-get update
        sudo apt-get install -y fuse libfuse-dev
    
    - name: Build for multiple platforms
      run: make build-all
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: filterfs-binaries
        path: bin/
    
    - name: Build Docker image
      run: |
        docker build -t filterfs:latest .
        docker save filterfs:latest | gzip > filterfs-docker.tar.gz
    
    - name: Upload Docker image
      uses: actions/upload-artifact@v3
      with:
        name: filterfs-docker
        path: filterfs-docker.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.21
    
    - name: Install FUSE
      run: |
        sudo apt-get update
        sudo apt-get install -y fuse libfuse-dev
    
    - name: Build release binaries
      run: make build-all
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./bin/
        asset_name: filterfs-binaries
        asset_content_type: application/octet-stream