version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar    # replaces the removed exportloopref/scopelint
    - dogsled
    - dupl
    - exhaustive
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - lll
    - misspell
    - mnd            # renamed from gomnd
    - nakedret
    - noctx
    - nolintlint
    - rowserrcheck
    - unconvert
    - unparam
    - whitespace

  # Not enabled (removed upstream, superseded, or intentionally off):
  # - deadcode/structcheck/varcheck -> unused (standard set)
  # - golint/interfacer/maligned    -> removed upstream
  # - gosimple/stylecheck           -> merged into staticcheck (standard set)
  # - depguard                      -> was enabled without rules, i.e. a no-op
  # - asciicheck, gochecknoglobals, gocognit, godot, godox, goerr113,
  #   nestif, prealloc, testpackage, wsl

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment  # Too strict for this project

    gocyclo:
      min-complexity: 15

    dupl:
      threshold: 100

    goconst:
      min-len: 2
      min-occurrences: 2

    misspell:
      locale: US

    lll:
      line-length: 120

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - ".*\\.pb\\.go$"
      - ".*_mock\\.go$"
      - vendor
    rules:
      - path: _test\.go
        linters:
          - mnd
          - funlen
          - gocyclo
          - goconst # repeated literals are fine in test tables
          - gosec   # G306: 0644 fixture files are fine in tests

      - path: cmd/
        linters:
          - gochecknoinits

      - source: "//go:generate"
        linters:
          - lll

      - text: "should have a package comment"
        linters:
          - staticcheck

      - text: "don't use ALL_CAPS in Go names"
        linters:
          - staticcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Hawkynt/FilterFilesystem
  exclusions:
    paths:
      - ".*\\.pb\\.go$"
      - ".*_mock\\.go$"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
